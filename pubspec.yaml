name: appsprint_flutter
description: Flutter AppSprint attribution SDK.
version: 0.1.0
homepage: https://appsprint.app

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.appsprint.flutter
        pluginClass: AppSprintFlutterPlugin
      ios:
        pluginClass: AppSprintFlutterPlugin
